<script src="https://cdn.tailwindcss.com"></script>

<style>
html, body { margin: 0 !important; padding: 0 !important; }

#auth-gate {
  position: fixed; inset: 0; background: var(--bodyB, #f8fafc);
  z-index: 999999; display: none; flex-direction: column;
  justify-content: flex-start; min-height: 100vh; height: 100vh;
  overflow-y: auto; font-family: inherit;
}
#auth-gate .ag-header {
  background: var(--contentB, #fff); border-bottom: 1px solid var(--contentL, #e3e7ef);
  position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px);
}
#auth-gate .ag-header-inner {
  display: flex; align-items: center; justify-content: space-between;
  gap: 1rem; padding: 0.5rem 1.25rem; max-width: 1024px; margin: 0 auto;
}
#auth-gate .ag-logo {
  display: flex; align-items: center; gap: 0.6rem; text-decoration: none;
  color: var(--headC, #111); font-size: 16px; font-weight: 500;
}
#auth-gate .ag-logo img { width: 32px; height: 32px; border-radius: 6px; object-fit: cover; }
#auth-gate .ag-content {
  display: flex; justify-content: center; align-items: flex-start;
  width: 100%; padding: 2rem 1rem; flex: 1;
}
#auth-gate .ag-card {
  background: var(--contentB, #fff); border-radius: 20px;
  border: 1px solid var(--contentL, #e3e7ef); overflow: hidden;
  max-width: 380px; width: 100%; margin: 0 auto;
  box-shadow: 0 1px 3px rgba(0,0,0,.08);
}
#auth-gate .ag-card-body { padding: 24px 20px 16px; text-align: center; }
#auth-gate .ag-lock-icon {
  width: 52px; height: 52px; background: rgba(37,99,235,.08); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; margin: 0 auto 14px;
}
#auth-gate .ag-card-title { font-size: 16px; font-weight: 600; color: var(--headC, #111); margin-bottom: 6px; }
#auth-gate .ag-card-desc { font-size: 13px; color: var(--bodyC, #555); line-height: 1.6; }
#auth-gate .ag-card-footer {
  border-top: 1px solid var(--contentL, #e3e7ef); padding: 14px 18px;
  display: flex; flex-direction: column; gap: 8px;
}
#auth-gate .ag-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px 16px; border-radius: 12px; font-size: 13px;
  font-weight: 500; cursor: pointer; text-decoration: none; border: none; transition: all .2s;
}
#auth-gate .ag-btn-primary { background: var(--linkC, #2563eb); color: #fff; }
#auth-gate .ag-btn-primary:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,.3); }
#auth-gate .ag-btn-outline { background: 0 0; border: 1px solid var(--contentL, #e3e7ef); color: var(--bodyC, #555); }
#auth-gate .ag-btn-outline:hover { background: var(--bodyB, #f8fafc); }
#auth-gate .ag-footer { border-top: 1px solid var(--contentL, #e3e7ef); padding: 1rem 1.25rem; margin-top: auto; }
#auth-gate .ag-footer-inner {
  display: flex; align-items: center; gap: 10px;
  max-width: 1024px; margin: 0 auto; flex-wrap: wrap;
}
#auth-gate .ag-footer a { font-size: 12px; color: var(--bodyC, #888); text-decoration: none; }
#auth-gate .ag-footer a:hover { color: var(--headC, #111); }
</style>

  <header class="ag-header">
    <div class="ag-header-inner">
      <a href="/" class="ag-logo">
        <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjlFuMZRXWUpxZK7ZWolRDFXmZuTNvT2uMzetcU_d2gXpLqZ_3B1-vl18e31nhKyo0C_6SOVsxszrL_FxtJ4YCma9QwhNB0BLiTcBNdqYTAuXStazw9Tds6ylCz0IpSEGZ2MnjCSXIfMtYxcnOV8H3sKC5szT2c3FCYDG_DvVIFtTvsgrzRWGO4kFURiO4=s1600" alt="Modweeb Design">
        <span>تصميم مودويب</span>
      </a>
    </div>
  </header>

  <div class="ag-content">
    <div class="ag-card">
      <div class="ag-card-body">
        <div class="ag-lock-icon">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="var(--linkC,#2563eb)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>

        </div>
      </div>
      <div class="ag-card-footer">
        <button class="ag-btn ag-btn-primary" onclick="showLoginPopup()">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>

        </button>
        <a href="/" class="ag-btn ag-btn-outline">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>

    <div class="ag-footer-inner">
      <a href="/" style="display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--headC);">
        <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjlFuMZRXWUpxZK7ZWolRDFXmZuTNvT2uMzetcU_d2gXpLqZ_3B1-vl18e31nhKyo0C_6SOVsxszrL_FxtJ4YCma9QwhNB0BLiTcBNdqYTAuXStazw9Tds6ylCz0IpSEGZ2MnjCSXIfMtYxcnOV8H3sKC5szT2c3FCYDG_DvVIFtTvsgrzRWGO4kFURiO4=s1600" width="22" height="22" style="border-radius:4px;" alt="">
        تصميم مودويب
      </a>
      <a href="/p/privacy-policy.html">خصوصية</a>
      <a href="/p/terms.html">شروط</a>
    </div>
  </footer>
</div>

<script>
(function () {
  var TARGET_URL = window.location.href;
  var isLoggedIn = localStorage.getItem("userLoggedIn") === "true";
  var gate       = document.getElementById("auth-gate");

  /* ── شاشة الترحيب وإعادة التوجيه ── */
  function redirectAfterLogin(userName) {
    var dest = sessionStorage.getItem("pendingRedirect") || TARGET_URL;
    sessionStorage.removeItem("pendingRedirect");

    var card = gate.querySelector(".ag-card");
    if (card) {
      card.innerHTML = [
        '<div class="ag-card-body" style="padding:32px 20px;text-align:center;">',
        '  <div style="width:56px;height:56px;background:rgba(37,99,235,.08);border-radius:50%;',
        '       display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">',
        '    <svg viewBox="0 0 24 24" width="28" height="28" fill="none"',
        '         stroke="var(--linkC,#2563eb)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">',
        '      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>',
        '      <polyline points="22 4 12 14.01 9 11.01"></polyline>',
        '    </svg>',
        '  </div>',
        '  <div style="font-size:16px;font-weight:600;color:var(--headC,#111);margin-bottom:6px;">',
        '    أهلاً بك' + (userName ? '، ' + userName : '') + '!',
        '  </div>',
        '  <div style="font-size:13px;color:var(--bodyC,#555);margin-bottom:18px;">',
        '    جارٍ تحميل مولد المقالات...',
        '  </div>',
        '  <div style="height:4px;background:var(--contentL,#e3e7ef);border-radius:99px;overflow:hidden;">',
        '    <div id="ag-progress-bar" style="height:100%;width:0%;background:var(--linkC,#2563eb);',
        '         border-radius:99px;transition:width 1.8s ease;"></div>',
        '  </div>',
        '</div>'
      ].join("");

      setTimeout(function () {
        var bar = document.getElementById("ag-progress-bar");
        if (bar) bar.style.width = "100%";
      }, 50);
    }

    setTimeout(function () { window.location.href = dest; }, 2000);
  }

  /* ── دالة showLoginPopup المحلية (احتياطية إذا لم تكن في القالب) ── */
  if (typeof window.showLoginPopup !== "function") {
    window.showLoginPopup = function () {
      sessionStorage.setItem("pendingRedirect", TARGET_URL);
      var cbu = encodeURIComponent(TARGET_URL);
      window.open("/p/login.html?cbu=" + cbu, "loginPopup", "width=500,height=600,scrollbars=yes,resizable=yes");
    };
  } else {
    var _orig = window.showLoginPopup;
    window.showLoginPopup = function () {
      sessionStorage.setItem("pendingRedirect", TARGET_URL);
      _orig();
    };
  }

  if (!isLoggedIn) {
    gate.style.display = "flex";
    document.querySelectorAll("body > *:not(#auth-gate):not(script):not(style):not(link)").forEach(function (el) {
      el.style.setProperty("display", "none", "important");
    });

    /* استقبال نجاح تسجيل الدخول من النافذة المنبثقة */
    window.addEventListener("message", function (e) {
      if (e.data && e.data.type === "loginSuccess" && e.data.user) {
        var u = e.data.user;
        localStorage.setItem("userLoggedIn", "true");
        localStorage.setItem("userName",    u.name  || "");
        localStorage.setItem("userEmail",   u.email || "");
        localStorage.setItem("userPicture", u.image || "");
        if (!localStorage.getItem("userJoinDate")) {
          localStorage.setItem("userJoinDate", new Date().toISOString());
        }
        redirectAfterLogin(u.name);
      }
    });

    /* تسجيل دخول من تبويب آخر */
    window.addEventListener("storage", function (e) {
      if (e.key === "userLoggedIn" && e.newValue === "true") {
        redirectAfterLogin(localStorage.getItem("userName"));
      }
    });

  } else {
    gate.style.display = "none";
    sessionStorage.removeItem("pendingRedirect");
  }
})();
</script>
