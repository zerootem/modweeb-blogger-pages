/* === تنسيقات مساعدة === */

/* === إشعار Toast === */
.toast {

  transition: opacity .3s ease-in-out;
  z-index: 1000000;

.toast.active { opacity: 1; }

<!-- ==================== مكتبة Google OAuth ==================== -->
<script src="https://accounts.google.com/gsi/client" async defer onload="initGSI()"></script>

<script>
/* ==================== [1] الإشعارات ==================== */
function notify(e) {
  if (window.opener && window.opener.PU && typeof window.opener.PU.tNtf === "function") {
    window.opener.PU.tNtf(e);
  } else {
    const o = document.getElementById("toastMessage");
    o && (o.innerText = e, o.classList.add("active"), setTimeout(() => o.classList.remove("active"), 3000));
  }
}

/* ==================== [2] جلب بيانات المستخدم بعد تسجيل الدخول ==================== */
async function getUserInfo(accessToken) {
  try {
    notify("جارٍ تسجيل الدخول، يرجى الانتظار...");
    const res = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", {
      headers: { Authorization: "Bearer " + accessToken }
    });
    if (!res.ok) throw new Error("Failed to fetch user info");
    const user = await res.json();

    const payload = {
      type: "loginSuccess",
      user: { name: user.name, email: user.email, image: user.picture }
    };

    if (window.opener) {
      /* ── نافذة منبثقة: أرسل البيانات للنافذة الأم ثم أغلق ── */
      const targetOrigin = window.location.origin.includes("blogspot")
        ? "https://modweeb.com"
        : window.location.origin;
      window.opener.postMessage(payload, targetOrigin);
      notify("تم تسجيل الدخول بنجاح! جارٍ إغلاق النافذة...");
      setTimeout(() => window.close(), 1200);
    } else {
      /* ── فتح مباشر: احفظ البيانات وأعد التوجيه مع عداد ── */
      localStorage.setItem("userLoggedIn", "true");
      localStorage.setItem("userName",    user.name);
      localStorage.setItem("userEmail",   user.email);
      localStorage.setItem("userPicture", user.picture);
      if (!localStorage.getItem("userJoinDate")) {
        localStorage.setItem("userJoinDate", new Date().toLocaleDateString("en-US", {
          year: "numeric", month: "short", day: "numeric"
        }));
      }

      /* قراءة وجهة إعادة التوجيه */
      const params     = new URLSearchParams(window.location.search);
      const redirectTo = params.get("cbu") || "/";

      /* استبدال البطاقة بشاشة الترحيب + عداد */
      const card = document.querySelector(".card");
      if (card) {
        card.style.borderRadius = "20px";
        card.innerHTML = `
          <div style="padding:28px 20px;text-align:center;">
            <div style="width:52px;height:52px;background:rgba(37,99,235,.08);border-radius:50%;
                        display:flex;align-items:center;justify-content:center;margin:0 auto 14px;">
              <svg viewBox="0 0 24 24" width="26" height="26" fill="none"
                   stroke="var(--linkC,#2563eb)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
            </div>
            <div style="font-size:16px;font-weight:600;color:var(--headC,#111);margin-bottom:4px;">
              أهلاً بك، ${user.name}!
            </div>
            <div style="font-size:12px;color:var(--bodyC,#888);margin-bottom:16px;">
              جارٍ إعادة التوجيه<span id="login-countdown"> (3)</span>
            </div>
            <div style="height:4px;background:var(--contentL,#e3e7ef);border-radius:99px;overflow:hidden;">
              <div id="login-progress" style="height:100%;width:0%;background:var(--linkC,#2563eb);
                   border-radius:99px;transition:width 2.8s ease;"></div>
            </div>
          </div>`;

        /* تشغيل شريط التقدم */
        setTimeout(() => {
          const bar = document.getElementById("login-progress");
          if (bar) bar.style.width = "100%";
        }, 50);

        /* عداد تنازلي */
        let count = 3;
        const countEl = document.getElementById("login-countdown");
        const timer = setInterval(() => {
          count--;
          if (countEl) countEl.textContent = ` (${count})`;
          if (count <= 0) clearInterval(timer);
        }, 1000);
      }

      setTimeout(() => { window.location.href = redirectTo; }, 3000);
    }
  } catch (err) {
    console.error("Error fetching user info:", err);
    notify("فشل تسجيل الدخول. يرجى المحاولة مرة أخرى.");
  }
}

/* ==================== [3] تهيئة مكتبة Google OAuth ==================== */
let gsiClient;
function initGSI() {
  if (typeof google === "undefined" || !google.accounts) {
    notify("فشل تحميل مكتبة جوجل. يرجى التحقق من الاتصال.");
    return;
  }
  gsiClient = google.accounts.oauth2.initTokenClient({
    client_id: "36053852280-iqmfrcu1m2vd8ai6sc4e10r6afaiiln0.apps.googleusercontent.com",
    scope: "openid profile email",
    callback: (response) => {
      if (response && response.access_token) {
        getUserInfo(response.access_token);
      } else {
        notify("لم يتم العثور على رمز الوصول. يرجى المحاولة مرة أخرى.");
      }
    }
  });
  document.getElementById("custom-google-btn").addEventListener("click", () => {
    gsiClient.requestAccessToken();
  });
}
</script>
